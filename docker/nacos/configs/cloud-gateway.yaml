server:
  port: 9527
spring:
  application:
    name: cloud-gateway
  cloud:
    # 添加Nacos服务发现配置
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true
    gateway:
      # 关闭按服务名自动生成路由，统一手动配置
      discovery:
        locator:
          enabled: false
      routes:
        - id: cloud-auth
          uri: lb://cloud-auth
          predicates:
            - Path=/auth/**
        - id: cloud-admin
          uri: lb://cloud-admin
          predicates:
            - Path=/admin/**
        - id: cloud-file
          uri: lb://cloud-file
          predicates:
            - Path=/file/**

# 网关白名单：以下路径不校验 token
gateway:
  cors:
    # 允许的源（可通过环境变量覆盖）
    allowed-origins:
      - "${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}"
    # 允许的 HTTP 方法 OPTIONS必需：CORS 预检
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    # 暴露的响应头
    exposed-headers:
      - Content-Disposition
      - Authorization
  white-list:
    - /auth/login
    - /auth/register
    - /auth/public-key
    - /actuator
    - /file/download

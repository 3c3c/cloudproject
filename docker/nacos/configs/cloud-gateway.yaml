server:
  port: 9527
spring:
  application:
    name: cloud-gateway
  cloud:
    gateway:
      # 关闭按服务名自动生成路由，统一手动配置
      discovery:
        locator:
          enabled: false
      routes:
        - id: cloud-auth
          uri: lb://cloud-auth
          predicates:
            - Path=/auth/**
        - id: cloud-product
          uri: lb://cloud-product
          predicates:
            - Path=/products/**
        - id: cloud-order
          uri: lb://cloud-order
          predicates:
            - Path=/orders/**

# 网关白名单：以下路径不校验 token
gateway:
  white-list:
    - /auth/login
    - /auth/register
    - /auth/sms/send
    - /auth/sms/login
    - /actuator

# =====================================================================
# 开发环境一键启动：Nacos 配置中心/注册中心 + MySQL + Redis + MinIO + Kafka
# Nacos 版本 v2.3.2，配套 Spring Cloud Alibaba 2023.0.1.0（自带 Nacos Client 2.3.2）
# Kafka 采用 KRaft 模式（无需 Zookeeper），供 cloud-message 服务异步消费消息。
#
#   启动： docker compose -f docker/nacos/docker-compose.yml up -d
#   导配置：bash docker/nacos/init-configs.sh
#   控制台：http://localhost:8848/nacos  （账号/密码：nacos / nacos）
#   MinIO： http://localhost:9001  （账号/密码：minioadmin / minioadmin）
#   Kafka： localhost:9092（PLAINTEXT，topic 自动创建）
#   停止： docker compose -f docker/nacos/docker-compose.yml down
# =====================================================================
services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos-standalone
    environment:
      - MODE=standalone          # 单机模式，内嵌 Derby 存储（开发够用；生产请接 MySQL）
      - PREFER_HOST_MODE=hostname
      # 鉴权（Nacos 2.2+ 默认开启，三个 token必填，否则启动告警/接口 403）
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkw
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
      - TIME_ZONE=Asia/Shanghai
    ports:
      - "8848:8848"   # HTTP 控制台 / Open API
      - "9848:9848"   # gRPC 客户端端口 —— Spring Cloud Alibaba 客户端必须能访问，否则连不上！
      - "9849:9849"   # gRPC 节点间通信（集群用；单机开了无妨）
    volumes:
      - nacos-logs:/home/nacos/logs
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: cloud-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - TZ=Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cloud-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: cloud-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - TZ=Asia/Shanghai
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # MinIO API 端口
      - "9001:9001"   # MinIO 控制台端口
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Kafka（KRaft 模式，无需 Zookeeper）
  # 供 cloud-message 服务异步消费消息。客户端默认连 localhost:9092。
  kafka:
    image: bitnami/kafka:3.7
    container_name: cloud-kafka
    environment:
      # ===== KRaft 共识配置（单节点）=====
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # ===== 监听器 =====
      # INTERNAL：容器内部 / 其它 compose 服务通过服务名 kafka 访问
      # PLAINTEXT：宿主机与各微服务通过 localhost:9092 访问（开发用，无鉴权）
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # ===== 开发环境友好项 =====
      # 允许客户端首次发消息/订阅时自动创建 topic（cloud-message-send 等）
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 单节点下默认副本数与最小同步副本都设为 1，避免生产者 acks/请求报错
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      # 允许删除 topic（开发调试用）
      KAFKA_CFG_DELETE_TOPIC_ENABLE: "true"
      # bitnami 镜像每次启动会清理 KRaft 日志重新格式化，保证单机开发可重复启动
      KAFKA_KRAFT_CLUSTER_ID: "cloud-project-dev-cluster"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  nacos-logs:
  mysql-data:
  redis-data:
  minio-data:
  kafka-data:
